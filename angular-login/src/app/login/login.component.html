<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Please sign in to your account</p>
    </div>

    <div *ngIf="loginSuccess" class="success-message">
      <h2>🎉 Login Successful!</h2>
      <p>Welcome, {{ username }}!</p>
      <button (click)="onReset()" class="btn btn-secondary">Logout</button>
    </div>

    <form *ngIf="!loginSuccess" (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          [disabled]="isLoading">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          [disabled]="isLoading">
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="loading-spinner"></span>
      </button>
    </form>

    <div class="login-footer">
      <p>Demo credentials: <strong>admin</strong> / <strong>admin123</strong></p>
    </div>
  </div>
</div>
