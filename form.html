<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sample Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    p.subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 18px;
      flex: 1;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input, select, textarea {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Registration Form</h1>
    <p class="subtitle">Please fill in the details below.</p>

    <form>
      <!-- Line 1: First Name + Last Name -->
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="John" required />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
        </div>
      </div>

      <!-- Line 2: Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required />
      </div>

      <!-- Line 3: Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" />
      </div>

      <!-- Line 4: Date of Birth -->
      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" />
      </div>

      <!-- Line 5: Gender -->
      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="" disabled selected>Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="nonbinary">Non-binary</option>
          <option value="other">Prefer not to say</option>
        </select>
      </div>

      <!-- Line 6: Country -->
      <div class="form-group">
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="" disabled selected>Select country</option>
          <option value="us">United States</option>
          <option value="uk">United Kingdom</option>
          <option value="ca">Canada</option>
          <option value="au">Australia</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Line 7: Address -->
      <div class="form-group">
        <label for="address">Street Address</label>
        <input type="text" id="address" name="address" placeholder="123 Main Street" />
      </div>

      <!-- Line 8: City + ZIP -->
      <div class="form-row">
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="New York" />
        </div>
        <div class="form-group">
          <label for="zip">ZIP / Postal Code</label>
          <input type="text" id="zip" name="zip" placeholder="10001" />
        </div>
      </div>

      <!-- Line 9: Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <!-- Line 10: Message / Notes -->
      <div class="form-group">
        <label for="message">Additional Notes</label>
        <textarea id="message" name="message" placeholder="Anything you'd like us to know..."></textarea>
      </div>

      <button type="submit" class="btn">Submit</button>
    </form>
  </div>
</body>
</html>
